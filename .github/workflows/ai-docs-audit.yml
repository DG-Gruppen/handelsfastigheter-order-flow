name: ai-docs-audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-impact-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Suggest docs to review
        run: |
          echo "Docs impact suggestions:" 
          if grep -E '^(src/hooks/|src/components/ProtectedRoute|src/pages/Admin|src/integrations/)' changed_files.txt; then
            echo "- Review docs/core/PERMISSION_MODEL.md"
            echo "- Review docs/governance/KNOWN_RISKS.md"
          fi
          if grep -E '^(src/pages/NewOrder|src/pages/OrderDetail|supabase/functions/|supabase/migrations/)' changed_files.txt; then
            echo "- Review docs/core/DOMAIN_RULES.md"
            echo "- Review docs/core/WORKFLOW_MAPS.md"
            echo "- Review docs/governance/KNOWN_RISKS.md"
          fi
          if grep -E '^(src/App.tsx|src/main.tsx|src/hooks/useNavSettings|src/hooks/useModules)' changed_files.txt; then
            echo "- Review docs/core/ARCHITECTURE.md"
            echo "- Review docs/core/PERMISSION_MODEL.md"
          fi
